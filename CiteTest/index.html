<!doctype html>
<html lang="en">
<head>
  
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="description" content="Themadhood site" />
<link rel="stylesheet" href="./assets/css/site.css" />

  <title>Themadhood</title>
</head>
<body data-page="home">
  
<div class="topbar">
  <div class="container topbar-inner">
    <a class="brand" data-brand-home href="./index.html">
      <img data-brand-logo src="" alt="Logo" />
      <div class="name" data-brand-name>Themadhood</div>
    </a>
    <nav class="nav" data-nav></nav>
  </div>
</div>

  <div class="container" style="padding-top:22px">
    <div class="hero">
      <div class="hero-bg" data-hero-bg></div>
      <div class="hero-content">
        <h1 data-hero-headline></h1>
        <div data-hero-body></div>
      </div>
    </div>

    <div class="grid" style="margin-top:14px">
      <div class="card" id="about">
        <h2 data-about-title></h2>
        <div data-about-body></div>
      </div>
    </div>

    <div class="grid" style="margin-top:14px">
      <div class="card">
        <h2 data-branches-title></h2>
        <div class="grid cols-3" data-branches></div>
      </div>
    </div>

    <div class="grid" style="margin-top:14px">
      <div class="card" id="contact">
        <h2 data-contact-title></h2>
        <p class="small" data-contact-note></p>
      </div>
    </div>
  </div>
  
<div class="footer">
  <div class="container footer-layout">

    <img class="footer-logo" data-footer-logo alt="Logo">

    <div class="footer-text">
      <h4 data-footer-title></h4>
      <div class="kv"><b>Email:</b> <a data-footer-email href="#"></a></div>
      <div class="small" data-footer-copy></div>
      <div class="small" data-footer-line2></div>
    </div>
  </div>
</div>

  <script src="./assets/app.js"></script>
</body>
</html>
